version: "3.9"

services:
  web:
    build: .
    container_name: myarea_cdds_web
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cdds:${POSTGRES_PASSWORD}@db:5432/cdds
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - packages_data:/app/packages
      - migrations_data:/app/migrations
      - imports_data:/app/imports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
      - myarea_shared_net

  db:
    image: postgres:16-alpine
    container_name: myarea_cdds_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cdds
      POSTGRES_USER: cdds
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdds"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: myarea_cdds_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: myarea_cdds_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8961}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - packages_data:/app/packages:ro
    depends_on:
      - web
    networks:
      - internal
      - myarea_shared_net

volumes:
  pg_data:
  redis_data:
  packages_data:
  migrations_data:
  imports_data:

networks:
  internal:
    driver: bridge
  myarea_shared_net:
    external: true
